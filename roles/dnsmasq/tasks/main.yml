- name: Install dnsmasq
  ansible.builtin.apt:
    update_cache: true
    name:
      - dnsmasq
    state: present

- name: Copy dnsmasq Config
  ansible.builtin.template:
    src: templates/dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: '644'
  notify: Restart dnsmasq
